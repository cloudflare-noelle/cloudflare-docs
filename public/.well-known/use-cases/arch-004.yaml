id: arch-004
name: Replace your multi-vendor dev stack with one platform and one bill
category: multi-vendor-architecture
description: >
  Replace multi-vendor dev stacks with Workers + Pages + R2 + D1 + KV — one bill, zero egress.
aliases:
  - "Platform consolidation"
  - "Replace multi-vendor dev stack"
  - "Reduce cloud vendor sprawl"
  - "Single platform developer stack"
  - "One bill for infrastructure"
products:
  - Workers
  - Pages
  - R2
  - D1
  - KV
  - Queues

qualifying_questions:
  - id: q1
    text: "What does your current stack look like?"
    options:
      - label: "Frontend host + separate backend"
        sets: [frontend-backend-split]
      - label: "Multiple cloud services stitched together"
        sets: [cloud-sprawl]
      - label: "Starting fresh, want to avoid vendor sprawl"
        sets: [greenfield]
  - id: q2
    text: "What data services do you need?"
    options:
      - label: "Object storage"
        sets: [needs-storage]
      - label: "SQL database"
        sets: [needs-sql]
      - label: "Key-value cache"
        sets: [needs-kv]
      - label: "All of the above"
        sets: [needs-storage, needs-sql, needs-kv]

default_path: greenfield-setup

paths:
  - id: full-stack-migration
    name: "Full Stack Consolidation"
    condition:
      has_any: [frontend-backend-split, cloud-sprawl]
    steps:
      - product: "Workers"
        action: create-worker
        description: "Create a Worker for your backend API or full-stack app"
      - product: "R2"
        action: create-bucket
        description: "Create R2 buckets for object storage"
      - product: "D1"
        action: create-database
        description: "Create D1 databases for your relational data"
      - product: "KV"
        action: create-namespace
        description: "Create KV namespaces for key-value caching"
      - product: "Workers"
        action: bind-services
        description: "Bind R2, D1, and KV to your Worker"
      - product: "Workers"
        action: deploy
        description: "Deploy and verify your consolidated stack"

  - id: greenfield-setup
    name: "Greenfield Single-Platform Setup"
    condition:
      has_any: [greenfield]
    steps:
      - product: "Workers"
        action: create-project
        description: "Initialize a new Workers project with Wrangler"
      - product: "Workers"
        action: choose-framework
        description: "Choose a framework (Next.js, Remix, Astro, Hono) or vanilla Workers"
      - product: "Workers"
        action: add-bindings
        description: "Add R2, D1, and KV bindings as needed"
      - product: "Workers"
        action: deploy
        description: "Deploy to Cloudflare's global network"

related_use_cases:
  - dev-001
  - dev-002
  - dev-003
  - dev-006

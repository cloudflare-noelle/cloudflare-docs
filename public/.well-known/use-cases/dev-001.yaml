id: dev-001
name: Build zero-cold-start serverless applications
category: developer-platform-build
aliases:
  - "Server-side A/B testing with Workers"
description: >
  Deploy code globally without managing infrastructure.
products:
  - Workers
  - Pages

qualifying_questions:
  - id: q1
    text: "What type of application are you building?"
    options:
      - label: "API or backend service"
        sets: [api-backend]
      - label: "Full-stack web application"
        sets: [full-stack]
      - label: "Edge middleware or request transformation"
        sets: [middleware]
      - label: "Scheduled/cron job"
        sets: [scheduled]

default_path: api-backend

paths:
  - id: api-backend
    name: "API/Backend Service"
    condition:
      has_any: [api-backend]
    steps:
      - product: "Workers"
        action: create-worker
        description: "Create a new Worker project with Wrangler CLI"
      - product: "Workers"
        action: write-handler
        description: "Write the fetch handler for your API routes"
      - product: "Workers"
        action: add-bindings
        description: "Add bindings for storage (KV, D1, R2) as needed"
      - product: "Workers"
        action: deploy
        description: "Deploy to Cloudflare's global network"

  - id: full-stack-app
    name: "Full-Stack Web Application"
    condition:
      has_any: [full-stack]
    steps:
      - product: "Pages"
        action: create-pages-project
        description: "Create a Pages project with your framework (Next.js, Remix, etc.)"
      - product: "Pages"
        action: configure-build
        description: "Configure build settings and environment variables"
      - product: "Workers"
        action: add-server-functions
        description: "Add server-side functions for dynamic functionality"
      - product: "Pages"
        action: deploy
        description: "Deploy via Git integration or direct upload"

  - id: middleware
    name: "Edge Middleware"
    condition:
      has_any: [middleware]
    steps:
      - product: "Workers"
        action: create-worker
        description: "Create a Worker for request/response transformation"
      - product: "Workers"
        action: configure-routes
        description: "Configure routes to intercept specific URL patterns"
      - product: "Workers"
        action: deploy
        description: "Deploy the Worker on your zone"

  - id: scheduled-job
    name: "Scheduled/Cron Worker"
    condition:
      has_any: [scheduled]
    steps:
      - product: "Workers"
        action: create-worker
        description: "Create a new Worker project with Wrangler CLI"
      - product: "Workers"
        action: configure-cron-trigger
        description: "Configure a Cron Trigger schedule in your Worker configuration"
      - product: "Workers"
        action: write-scheduled-handler
        description: "Write the scheduled event handler for your recurring task"
      - product: "Workers"
        action: deploy
        description: "Deploy to Cloudflare's global network"

related_use_cases:
  - dev-006
  - dev-002
  - dev-003

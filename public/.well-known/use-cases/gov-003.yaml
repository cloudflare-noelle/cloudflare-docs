id: gov-003
name: Meet US federal compliance requirements (FedRAMP, TIC 3.0)
category: compliance-data-governance
aliases:
  - "Achieve FedRAMP authorization"
  - "Implement TIC 3.0 compliance"
  - "Federal government compliance"
description: >
  Deploy Cloudflare services in FedRAMP processing locations and extend
  TIC 3.0 security capabilities globally.
products:
  - Cloudflare for Government
  - Network Services (FedRAMP)
  - Gateway
  - Logs

default_path: fedramp-setup

paths:
  - id: fedramp-setup
    name: "FedRAMP Deployment"
    steps:
      - product: "Cloudflare for Government"
        action: engage-federal-team
        description: "Engage the Cloudflare for Government team"
      - product: "Cloudflare for Government"
        action: review-authorization-level
        description: "Confirm FedRAMP Moderate authorization (High in process)"
      - product: "Cloudflare for Government"
        action: configure-fedramp-locations
        description: "Deploy services in FedRAMP processing locations"
      - product: "Cloudflare for Government"
        action: configure-compliance-controls
        description: "Configure security controls per FedRAMP requirements"
      - product: "Logs"
        action: configure-audit-logging
        description: "Enable comprehensive audit logging"

  - id: tic-3-setup
    name: "TIC 3.0 Implementation"
    steps:
      - product: "Cloudflare for Government"
        action: review-tic-capabilities
        description: "Review Cloudflare's TIC 3.0 capability mapping"
      - product: "Cloudflare for Government"
        action: extend-boundary-globally
        description: "Extend TIC boundary from centralized data centers to Cloudflare's global network"
      - product: "Gateway"
        action: configure-traffic-inspection
        description: "Configure traffic inspection per TIC 3.0 use cases"
      - product: "Logs"
        action: configure-telemetry
        description: "Configure telemetry and logging for CISA compliance"

related_use_cases:
  - ind-006
  - ind-009
  - net-001

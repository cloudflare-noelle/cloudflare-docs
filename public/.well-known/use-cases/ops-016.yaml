id: ops-016
name: Reduce AI costs and prevent surprise bills
category: developer-platform-operate
description: >
  Keep AI spending predictable and lower your monthly AI bills by caching common requests, choosing cheaper models, and setting spending limits.
aliases:
  - "Lower AI API costs"
  - "Stop AI cost overruns"
  - "Manage AI spending"
  - "Reduce OpenAI bills"
  - "AI budget control"
  - "AI cost optimization"
  - "Inference cost reduction"
  - "LLM token cost management"
  - "Semantic caching"
  - "Model routing"
  - "Multi-provider AI gateway"
products:
  - AI Gateway
  - Workers AI
  - R2
  - Analytics

qualifying_questions:
  - id: q1
    text: "What is your biggest concern about AI costs?"
    options:
      - label: "Paying repeatedly for the same or similar AI requests"
        sets: [caching-needed]
      - label: "Monthly AI bills are unpredictable or spiking"
        sets: [unpredictable-costs]
      - label: "Want to automatically pick the cheapest AI provider"
        sets: [multi-provider]
      - label: "Need to track AI spending by team or project"
        sets: [cost-tracking]
      - label: "Paying high data transfer fees for AI workloads"
        sets: [egress-optimization]
      - label: "I'm not sure"
        sets: [caching-needed, evaluating]
  - id: q2
    text: "Which AI services are you using?"
    options:
      - label: "OpenAI, Anthropic, or other paid APIs"
        sets: [external-apis]
      - label: "Cloudflare Workers AI"
        sets: [workers-ai]
      - label: "A mix of different services"
        sets: [external-apis, workers-ai]
      - label: "Not sure / still deciding"
        sets: [evaluating]

default_path: caching-optimization

paths:
  - id: caching-optimization
    name: "Cache AI responses to avoid paying twice"
    condition:
      has_any: [caching-needed, evaluating]
    steps:
      - product: "AI Gateway"
        action: enable-response-caching
        description: "Enable caching so repeated or similar questions don't trigger new API charges"
      - product: "AI Gateway"
        action: configure-cache-ttl
        description: "Set how long to keep cached responses (longer for stable answers)"
      - product: "AI Gateway"
        action: monitor-cache-hit-rate
        description: "Check your dashboard to see how much you're saving from caching"

  - id: multi-provider-routing
    name: "Automatically pick the cheapest AI option"
    condition:
      has_any: [multi-provider, external-apis, evaluating]
    steps:
      - product: "AI Gateway"
        action: configure-model-routing
        description: "Set up automatic routing to cheaper backup models when primary is expensive or down"
      - product: "AI Gateway"
        action: define-cost-limits
        description: "Set maximum cost per request to prevent surprise charges"
      - product: "AI Gateway"
        action: enable-auto-retry
        description: "Enable automatic fallback to lower-cost models when rate limits hit"

  - id: usage-monitoring
    name: "Track spending and set budgets"
    condition:
      has_any: [cost-tracking, unpredictable-costs]
    steps:
      - product: "Analytics"
        action: configure-ai-usage-dashboard
        description: "Set up a dashboard showing AI usage and costs by team, project, or endpoint"
      - product: "AI Gateway"
        action: set-rate-limits
        description: "Configure request limits to cap monthly spending"
      - product: "AI Gateway"
        action: create-cost-alerts
        description: "Get alerts when daily or monthly spending exceeds your budget"

  - id: zero-egress-ai
    name: "Eliminate data transfer fees for AI"
    condition:
      has_any: [egress-optimization, workers-ai]
    steps:
      - product: "Workers AI"
        action: run-inference-at-edge
        description: "Run AI inference on Cloudflare's network instead of paying egress to external APIs"
      - product: "R2"
        action: store-training-data
        description: "Store AI training data in R2 with zero egress fees"
      - product: "R2"
        action: configure-s3-api
        description: "Use standard S3 tools to manage your AI data without transfer costs"

related_use_cases:
  - dev-011
  - ops-011
  - aisec-001

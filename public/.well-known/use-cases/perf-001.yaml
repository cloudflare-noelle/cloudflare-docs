id: perf-001
name: Accelerate content delivery globally (CDN)
category: application-performance-delivery
description: >
  Cache and deliver static/dynamic content from 330+ cities via Anycast.
aliases:
  - "Improve Time To First Byte (TTFB)"
  - "Make your website respond faster"
  - "CDN setup"
products:
  - CDN
  - Cache
  - Tiered Cache
  - Argo Smart Routing
  - Cache Reserve

qualifying_questions:
  - id: q1
    text: "What type of content are you delivering?"
    options:
      - label: "Static assets (images, CSS, JS, fonts)"
        sets: [static]
      - label: "Dynamic HTML pages"
        sets: [dynamic]
      - label: "Large files (video, software downloads)"
        sets: [large-files]
      - label: "Mix of everything"
        sets: [static, dynamic, large-files]
  - id: q2
    text: "Do you need to minimize origin egress costs?"
    options:
      - label: "Yes, egress costs are a concern"
        sets: [egress-concern]
      - label: "No, performance is the priority"
        sets: [performance-first]

default_path: standard-cdn

paths:
  - id: standard-cdn
    name: "Standard CDN Setup"
    condition:
      has_any: [static, dynamic]
    steps:
      - product: "CDN"
        action: configure-caching
        description: "Configure cache rules for your content types"
      - product: "CDN"
        action: enable-tiered-cache
        description: "Enable Tiered Cache (Smart Tiered Cache or custom topology)"
      - product: "CDN"
        action: configure-cache-rules
        description: "Create cache rules for dynamic content caching where applicable"
      - product: "CDN"
        action: configure-browser-cache-ttl
        description: "Set browser cache TTL for optimal client-side caching"

  - id: large-file-delivery
    name: "Large File Delivery"
    condition:
      has_any: [large-files]
    steps:
      - product: "CDN"
        action: enable-tiered-cache
        description: "Enable Tiered Cache for better cache hit ratios"
      - product: "Cache Reserve"
        action: enable-cache-reserve
        description: "Enable Cache Reserve for persistent storage of large objects"
      - product: "CDN"
        action: configure-range-requests
        description: "Ensure range request support for resumable downloads"

  - id: egress-optimized
    name: "Egress-Optimized CDN"
    condition:
      has_any: [egress-concern]
    steps:
      - product: "CDN"
        action: enable-tiered-cache
        description: "Enable Tiered Cache to reduce origin pulls"
      - product: "Cache Reserve"
        action: enable-cache-reserve
        description: "Enable Cache Reserve for persistent caching"
      - product: "Argo Smart Routing"
        action: enable-argo-smart-routing
        description: "Enable Argo Smart Routing for optimal paths"

  - id: ttfb-optimization
    name: "TTFB Optimization"
    condition:
      has_any: [static, dynamic, performance-first]
    steps:
      - product: "CDN"
        action: configure-caching
        description: "Maximize cache hit ratio with appropriate cache rules"
      - product: "CDN"
        action: enable-tiered-cache
        description: "Enable Tiered Cache to reduce origin pulls"
      - product: "Argo Smart Routing"
        action: enable-argo-smart-routing
        description: "Enable Argo Smart Routing for optimized network paths"
      - product: "CDN"
        action: enable-early-hints
        description: "Enable Early Hints (103) to preload critical resources"
      - product: "CDN"
        action: review-cache-analytics
        description: "Review cache analytics to identify uncached content"

related_use_cases:
  - perf-002
  - perf-005
  - perf-004

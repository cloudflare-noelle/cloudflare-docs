id: perf-016
name: Prepare for high traffic events
category: application-performance-delivery
description: >
  Configure Waiting Room, cache settings, and origin scaling ahead of expected traffic surges.
aliases:
  - "High traffic event preparation"
  - "Traffic surge planning"
  - "Flash sale preparation"
  - "Product launch traffic management"
  - "Manage traffic surges with a waiting room"
products:
  - Waiting Room
  - Cache
  - Load Balancing

qualifying_questions:
  - id: q1
    text: "What type of event are you preparing for?"
    options:
      - label: "Flash sale or product launch"
        sets: [flash-sale]
      - label: "Seasonal traffic spike (holiday, back-to-school)"
        sets: [seasonal]
      - label: "Live event (broadcast, stream, announcement)"
        sets: [live-event]
      - label: "General preparedness"
        sets: [general]
      - label: "Multiple event types"
        sets: [flash-sale, general, live-event, seasonal]
  - id: q2
    text: "Do you know your expected traffic volume?"
    options:
      - label: "Yes, we have estimates"
        sets: [known-volume]
      - label: "No, it could be unpredictable"
        sets: [unknown-volume]

default_path: event-preparation

paths:
  - id: event-preparation
    name: "High Traffic Event Preparation"
    condition:
      has_any: [flash-sale, seasonal, live-event, general]
    steps:
      - product: "Cache"
        action: review-cache-rules
        description: "Review and optimize cache rules to maximize cache hit ratio"
      - product: "Cache"
        action: enable-tiered-cache
        description: "Enable tiered caching to reduce origin load"
      - product: "Waiting Room"
        action: configure-waiting-room
        description: "Set up a Waiting Room with appropriate thresholds for your expected traffic"
      - product: "Load Balancing"
        action: review-health-checks
        description: "Verify health checks and failover configuration for origin pools"
      - product: "Cache"
        action: pre-warm-cache
        description: "Pre-warm cache for key assets before the event starts"

  - id: waiting-room-setup
    name: "Dedicated Waiting Room Setup"
    condition:
      has_any: [flash-sale, seasonal, live-event, general]
    steps:
      - product: "Waiting Room"
        action: create-waiting-room
        description: "Create a Waiting Room for your high-traffic page"
      - product: "Waiting Room"
        action: configure-thresholds
        description: "Set total active users and new users per minute thresholds"
      - product: "Waiting Room"
        action: customize-page
        description: "Customize the waiting room page with your branding"
      - product: "Waiting Room"
        action: configure-session-duration
        description: "Set session duration and cookie lifetime"
      - product: "Waiting Room"
        action: enable-queueing
        description: "Choose queueing method (FIFO, random, passthrough)"

related_use_cases:
  - perf-001
  - perf-003
  - ind-002

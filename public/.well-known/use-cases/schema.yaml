# Use Case YAML Schema Definition
# Each use case file follows this structure

schema_version: "1.0"

fields:
  id:
    type: string
    required: true
    description: "Unique identifier (e.g., sec-001, zt-003)"

  name:
    type: string
    required: true
    description: "Human-readable use case name"

  category:
    type: string
    required: true
    description: "Category slug from the controlled vocabulary"
    enum:
      - network-application-security
      - ai-security
      - zero-trust-secure-access
      - network-connectivity-wan
      - application-performance-delivery
      - developer-platform-build
      - developer-platform-operate
      - compliance-data-governance
      - observability-analytics
      - multi-vendor-architecture
      - industry-verticals
      - getting-started

  description:
    type: string
    required: true
    description: "Concise description of the customer goal"

  aliases:
    type: list[string]
    required: false
    description: "Alternate names, industry jargon, and search keywords for discoverability"

  products:
    type: list[string]
    required: true
    description: "Cloudflare products involved in this use case"

  qualifying_questions:
    type: list[question]
    required: false
    description: "Questions to ask the customer to narrow down their specific need"
    item_schema:
      id:
        type: string
        description: "Question identifier (q1, q2, ...)"
      text:
        type: string
        description: "The question to present to the customer"
      options:
        type: list[option]
        description: "Possible answers"
        item_schema:
          label:
            type: string
            description: "Display text for this option"
          sets:
            type: list[string]
            description: "Context tags accumulated when this option is selected"
          followup:
            type: string
            required: false
            description: "ID of a follow-up question triggered by this option"

  default_path:
    type: string
    required: true
    description: "ID of the recommended path for non-interactive agents that cannot walk qualifying questions"

  paths:
    type: list[path]
    required: true
    description: "Concrete implementation plans based on qualifying context"
    item_schema:
      id:
        type: string
        description: "Path identifier"
      name:
        type: string
        description: "Human-readable path name"
      condition:
        type: object
        required: false
        description: "When this path applies based on accumulated sets"
        fields:
          has_any:
            type: list[string]
            description: "Path matches if ANY of these tags are in context"
          has_all:
            type: list[string]
            description: "Path matches if ALL of these tags are in context"
      steps:
        type: list[step]
        description: "Ordered sequence of actions"
        item_schema:
          product:
            type: string
            description: "Cloudflare product name"
          action:
            type: string
            description: "Specific action within that product"
          description:
            type: string
            required: false
            description: "Human-readable explanation of this step"

  related_use_cases:
    type: list[string]
    required: false
    description: "IDs of related use cases for cross-referencing"

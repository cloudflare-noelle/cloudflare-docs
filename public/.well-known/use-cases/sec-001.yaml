id: sec-001
name: Prevent DDoS attacks
category: network-application-security
aliases:
  - "Protect network infrastructure (L3/L4 DDoS)"
  - "Magic Transit deployment"
description: >
  Protect applications and networks from denial-of-service attacks of any size and kind.
products:
  - DDoS Protection
  - Magic Transit
  - Spectrum
  - Smart Shield
  - Cloudflare Network Firewall
  - WAF

qualifying_questions:
  - id: q1
    text: "What type of assets are you protecting from DDoS attacks?"
    options:
      - label: "Web applications (HTTP/HTTPS)"
        sets: [layer-7]
      - label: "Network infrastructure (IP subnets, data centers)"
        sets: [layer-3-4]
      - label: "Non-HTTP services (gaming, email, custom TCP/UDP)"
        sets: [spectrum]
  - id: q2
    text: "Do you have your own IP address space (ASN/IP prefixes)?"
    options:
      - label: "Yes, I have my own IP prefixes"
        sets: [own-ips]
      - label: "No, I don't have my own IP prefixes"
        sets: [cloudflare-ips]
  - id: q3
    text: "What deployment model do you need for network protection?"
    options:
      - label: "Always-on (traffic always routed through Cloudflare)"
        sets: [always-on]
      - label: "On-demand (activate during attacks only)"
        sets: [on-demand]
      - label: "Not applicable (web/non-HTTP only)"
        sets: []

default_path: l7-ddos

paths:
  - id: l7-ddos
    name: "Layer 7 DDoS Protection"
    condition:
      has_any: [layer-7]
    steps:
      - product: "DDoS Protection"
        action: enable-l7-managed-rules
        description: "Enable HTTP DDoS Attack Protection managed ruleset"
      - product: "DDoS Protection"
        action: configure-adaptive-protection
        description: "Enable Adaptive DDoS Protection for traffic profiling"
      - product: "WAF"
        action: create-rate-limiting-rule
        description: "Add rate limiting rules as an additional layer"

  - id: network-ddos
    name: "Network-layer DDoS Protection (Magic Transit)"
    condition:
      has_all: [layer-3-4, own-ips]
    steps:
      - product: "Magic Transit"
        action: onboard-ip-prefixes
        description: "Advertise your IP prefixes through Cloudflare"
      - product: "Magic Transit"
        action: configure-tunnels
        description: "Set up GRE or IPsec tunnels for traffic return"
      - product: "Magic Transit"
        action: configure-health-checks
        description: "Enable tunnel health checks and failover"
      - product: "Cloudflare Network Firewall"
        action: create-firewall-rules
        description: "Add Cloudflare Network Firewall rules for granular traffic control"

  - id: spectrum-ddos
    name: "Non-HTTP DDoS Protection (Spectrum)"
    condition:
      has_any: [spectrum]
    steps:
      - product: "Spectrum"
        action: create-spectrum-app
        description: "Create a Spectrum application for your TCP/UDP service"
      - product: "Spectrum"
        action: configure-origin
        description: "Point to your origin server IP and port"
      - product: "DDoS Protection"
        action: review-analytics
        description: "Monitor attack mitigation in Security Analytics"

  - id: always-on-magic-transit
    name: "Always-On Magic Transit"
    condition:
      has_all: [layer-3-4, own-ips, always-on]
    steps:
      - product: "Magic Transit"
        action: onboard-ip-prefixes
        description: "Advertise your IP prefixes through Cloudflare (BGP)"
      - product: "Magic Transit"
        action: configure-tunnels
        description: "Set up GRE or IPsec tunnels for clean traffic return"
      - product: "Magic Transit"
        action: configure-health-checks
        description: "Enable tunnel health checks and automatic failover"
      - product: "Cloudflare Network Firewall"
        action: create-firewall-rules
        description: "Create Cloudflare Network Firewall rules for traffic control"
      - product: "Magic Transit"
        action: enable-flow-analytics
        description: "Enable flow-based analytics for traffic visibility"

  - id: on-demand-magic-transit
    name: "On-Demand Magic Transit"
    condition:
      has_all: [layer-3-4, own-ips, on-demand]
    steps:
      - product: "Magic Transit"
        action: onboard-ip-prefixes
        description: "Register IP prefixes with Cloudflare (not yet advertised)"
      - product: "Magic Transit"
        action: configure-tunnels
        description: "Pre-configure tunnels for when protection is activated"
      - product: "Magic Transit"
        action: configure-activation
        description: "Set up on-demand activation (API, dashboard, or auto-detection)"

  - id: active-incident-response
    name: "Active DDoS Incident Response"
    condition:
      has_any: [layer-7, layer-3-4, spectrum]
    steps:
      - product: "DDoS Protection"
        action: verify-under-attack
        description: "Confirm the attack is active via Security Analytics and traffic graphs"
      - product: "DDoS Protection"
        action: enable-under-attack-mode
        description: "Enable I'm Under Attack Mode for immediate JavaScript challenge on all requests"
      - product: "WAF"
        action: create-custom-rules
        description: "Create WAF custom rules to block attack patterns (IP ranges, ASNs, countries)"
      - product: "DDoS Protection"
        action: adjust-sensitivity
        description: "Increase DDoS managed rule sensitivity to High"
      - product: "DDoS Protection"
        action: contact-support
        description: "Contact Cloudflare support for Enterprise-level mitigation assistance"
      - product: "DDoS Protection"
        action: post-incident-review
        description: "Review attack analytics and tune rules to prevent recurrence"

related_use_cases:
  - net-006
  - sec-002
  - sec-019
  - net-004
  - net-005

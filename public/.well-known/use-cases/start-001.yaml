id: start-001
name: Onboard your first domain to Cloudflare
category: getting-started
description: >
  Add a domain, configure DNS, enable proxy, set up basic security.
aliases:
  - "Verify my DNS is set up correctly"
  - "DNS configuration checklist"
  - "Make sure DNS is right before going live"
  - "DNS impacts other Cloudflare services"
products:
  - DNS
  - SSL/TLS
  - CDN
  - Account
  - Registrar

qualifying_questions:
  - id: q1
    text: "What do you need help with?"
    options:
      - label: "Moving my domain to Cloudflare for the first time"
        sets: [onboarding]
      - label: "Making sure my existing DNS configuration is correct"
        sets: [verify-dns]
      - label: "I'm not sure"
        sets: [onboarding]
  - id: q2
    text: "Do you already have a domain registered?"
    condition:
      has_any: [onboarding]
    options:
      - label: "Yes, I have a domain at another registrar"
        sets: [existing-domain]
      - label: "No, I need to register a new domain"
        sets: [new-domain]
  - id: q3
    text: "What is your primary goal?"
    condition:
      has_any: [onboarding]
    options:
      - label: "Security (DDoS protection, WAF)"
        sets: [security-first]
      - label: "Performance (CDN, caching)"
        sets: [performance-first]
      - label: "Both security and performance"
        sets: [security-first, performance-first]

default_path: existing-domain-onboard

paths:
  - id: existing-domain-onboard
    name: "Onboard Existing Domain"
    condition:
      has_any: [existing-domain]
    steps:
      - product: "Account"
        action: create-account
        description: "Create a Cloudflare account"
      - product: "DNS"
        action: disable-dnssec-at-registrar
        description: "Disable DNSSEC at your current registrar before changing nameservers to avoid resolution failures"
      - product: "DNS"
        action: add-domain
        description: "Add your domain to Cloudflare"
      - product: "DNS"
        action: review-scanned-records
        description: "Review auto-scanned DNS records for accuracy"
      - product: "DNS"
        action: update-nameservers
        description: "Update nameservers at your current DNS provider to Cloudflare's"
      - product: "CDN"
        action: verify-proxy-status
        description: "Verify DNS records are proxied (orange cloud)"
      - product: "DNS"
        action: enable-dnssec
        description: "Re-enable DNSSEC through Cloudflare to protect your domain from spoofing"

  - id: new-domain-onboard
    name: "Register and Onboard New Domain"
    condition:
      has_any: [new-domain]
    steps:
      - product: "Registrar"
        action: search-domain
        description: "Search for an available domain"
      - product: "Registrar"
        action: register-domain
        description: "Register the domain at Cloudflare (at-cost pricing)"

  - id: verify-dns
    name: "Verify Your DNS Configuration Is Correct"
    condition:
      has_any: [verify-dns]
    steps:
      - product: "DNS"
        action: audit-dns-records
        description: "Review all DNS records and compare against your origin server configuration"
      - product: "DNS"
        action: check-proxy-status
        description: "Confirm which records are proxied (orange cloud) vs DNS-only (gray cloud) and why"
      - product: "SSL/TLS"
        action: verify-encryption-mode
        description: "Check that your SSL/TLS mode matches your origin certificate setup to avoid errors"
      - product: "DNS"
        action: check-propagation
        description: "Verify nameserver delegation and DNS propagation are complete"
      - product: "DNS"
        action: review-missing-records
        description: "Identify any missing records (MX, SPF, DKIM) that could break email or other services"
      - product: "DNS"
        action: check-dnssec
        description: "Verify DNSSEC is enabled and properly configured to protect against domain spoofing"

related_use_cases:
  - start-002
  - perf-013
  - sec-017
  - sec-021

id: start-004
name: Migrate from another provider to Cloudflare
category: getting-started
description: >
  Move your site or application from another hosting or CDN provider to Cloudflare.
aliases:
  - "Migrate from another CDN"
  - "Migrate from another hosting provider"
  - "Switch CDN providers"
  - "Move to Cloudflare"
products:
  - Workers
  - Pages
  - DNS
  - CDN

qualifying_questions:
  - id: q1
    text: "What are you migrating?"
    options:
      - label: "A full-stack web application (with server-side code)"
        sets: [fullstack]
      - label: "A static site or frontend"
        sets: [static]
      - label: "Just DNS and CDN (keeping my existing origin)"
        sets: [dns-cdn]
  - id: q2
    text: "Where is your site currently hosted?"
    options:
      - label: "A frontend hosting platform"
        sets: [frontend-host]
      - label: "A traditional CDN"
        sets: [cdn-provider]
      - label: "A cloud provider (compute, storage, functions)"
        sets: [cloud-provider]
      - label: "Other provider"
        sets: [other]

default_path: migrate-dns-cdn

paths:
  - id: migrate-fullstack
    name: "Migrate Full-Stack Application"
    condition:
      has_any: [fullstack]
    steps:
      - product: "Workers"
        action: review-migration-guide
        description: "Review the migration guide for your current provider"
      - product: "Workers"
        action: adapt-code
        description: "Adapt your application code for the Workers runtime"
      - product: "Workers"
        action: configure-bindings
        description: "Set up storage and database bindings (R2, D1, KV) to replace external services"
      - product: "Workers"
        action: deploy
        description: "Deploy your application and verify functionality"
      - product: "DNS"
        action: update-dns
        description: "Update DNS to point to your new deployment"

  - id: migrate-static
    name: "Migrate Static Site"
    condition:
      has_any: [static]
    steps:
      - product: "Pages"
        action: create-pages-project
        description: "Create a Pages project and connect your Git repository"
      - product: "Pages"
        action: configure-build
        description: "Configure build settings for your framework"
      - product: "Pages"
        action: deploy
        description: "Deploy and verify your site"
      - product: "DNS"
        action: configure-custom-domain
        description: "Point your custom domain to the Pages deployment"

  - id: migrate-dns-cdn
    name: "Migrate DNS and CDN Only"
    condition:
      has_any: [dns-cdn]
    steps:
      - product: "DNS"
        action: add-domain
        description: "Add your domain to Cloudflare"
      - product: "DNS"
        action: import-records
        description: "Import your existing DNS records"
      - product: "CDN"
        action: configure-caching
        description: "Configure caching rules to match your current CDN behavior"
      - product: "DNS"
        action: update-nameservers
        description: "Update nameservers at your registrar to activate Cloudflare"

related_use_cases:
  - start-001
  - dev-006
  - perf-001

id: zt-001
name: Replace your VPN with identity-based application access
category: zero-trust-secure-access
description: >
  Identity-first, quantum-safe access to internal apps and infrastructure.
products:
  - Access
  - Cloudflare Tunnel
  - Gateway

qualifying_questions:
  - id: q1
    text: "What types of internal resources do users need to access?"
    options:
      - label: "Web applications (HTTP/HTTPS)"
        sets: [web-apps]
      - label: "SSH/RDP to servers"
        sets: [ssh-rdp]
      - label: "Private network resources (non-web)"
        sets: [private-network]
      - label: "All of the above"
        sets: [web-apps, ssh-rdp, private-network]
  - id: q2
    text: "How large is your user base?"
    options:
      - label: "Small team (< 50 users)"
        sets: [small]
      - label: "Medium organization (50-500 users)"
        sets: [medium]
      - label: "Large enterprise (500+ users)"
        sets: [enterprise]
  - id: q3
    text: "Do you have an existing identity provider (IdP)?"
    options:
      - label: "Yes (Okta, Azure AD, Google Workspace, etc.)"
        sets: [has-idp]
      - label: "No"
        sets: [no-idp]
      - label: "I'm not sure"
        sets: [no-idp]

default_path: web-app-ztna

paths:
  - id: web-app-ztna
    name: "ZTNA for Web Applications"
    condition:
      has_any: [web-apps]
    steps:
      - product: "Access"
        action: configure-idp
        description: "Connect your identity provider to Cloudflare Access"
      - product: "Cloudflare Tunnel"
        action: create-tunnel
        description: "Create a Cloudflare Tunnel to your internal web applications"
      - product: "Cloudflare Tunnel"
        action: configure-public-hostname
        description: "Map a public hostname to your internal application via the tunnel"
      - product: "Access"
        action: create-access-application
        description: "Create an Access application with identity-based policies"
      - product: "Access"
        action: create-access-policy
        description: "Define who can access the application (groups, emails, etc.)"

  - id: ssh-rdp-ztna
    name: "ZTNA for SSH/RDP Access"
    condition:
      has_any: [ssh-rdp]
    steps:
      - product: "Access"
        action: configure-idp
        description: "Connect your identity provider to Cloudflare Access"
      - product: "Cloudflare Tunnel"
        action: create-tunnel
        description: "Create a Cloudflare Tunnel to your SSH/RDP servers"
      - product: "Access"
        action: create-access-application
        description: "Create Access application for SSH/RDP"
      - product: "Access"
        action: enable-browser-rendering
        description: "Enable browser-based SSH or RDP for clientless access"
      - product: "Access"
        action: configure-session-logging
        description: "Enable session recording and audit logging"

  - id: private-network-ztna
    name: "ZTNA for Private Networks"
    condition:
      has_any: [private-network]
    steps:
      - product: "Access"
        action: configure-idp
        description: "Connect your identity provider"
      - product: "Cloudflare Tunnel"
        action: create-tunnel
        description: "Create a Cloudflare Tunnel with private network routing"
      - product: "Cloudflare Tunnel"
        action: configure-private-network
        description: "Add private network CIDR ranges to the tunnel"
      - product: "Access"
        action: deploy-warp-client
        description: "Deploy WARP client to user devices for private network access"
      - product: "Gateway"
        action: create-network-policy
        description: "Create Gateway network policies for traffic filtering"

related_use_cases:
  - zt-002
  - zt-013
  - zt-014
  - net-001
